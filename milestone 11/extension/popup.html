<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Browser Sidekick</title>
    <style>
      /* ── Reset & Base ──────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        min-height: 520px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ────────────────────────────────────────────────────────── */
      .header {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        padding: 16px 18px 14px;
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .header-text h1 {
        font-size: 14px;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: 0.01em;
      }

      .header-text p {
        font-size: 11px;
        color: #64748b;
        margin-top: 1px;
      }

      .status-dot {
        margin-left: auto;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 6px #22c55e;
      }
      .status-dot.offline {
        background: #ef4444;
        box-shadow: 0 0 6px #ef4444;
      }

      /* ── Main Content ──────────────────────────────────────────────────── */
      .main {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Instruction Input ─────────────────────────────────────────────── */
      .input-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      #instruction {
        width: 100%;
        min-height: 90px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 13px;
        line-height: 1.5;
        padding: 10px 12px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
      }
      #instruction:focus {
        border-color: #6366f1;
      }
      #instruction::placeholder {
        color: #475569;
      }

      /* ── URL Input ─────────────────────────────────────────────────────── */
      #url-input {
        width: 100%;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 12px;
        padding: 8px 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      #url-input:focus {
        border-color: #6366f1;
      }
      #url-input::placeholder {
        color: #475569;
      }

      /* ── Buttons ───────────────────────────────────────────────────────── */
      .btn-row {
        display: flex;
        gap: 8px;
      }

      .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: #1e293b;
        border: 1px solid #334155;
        color: #94a3b8;
      }
      .btn-secondary:hover {
        background: #334155;
        color: #e2e8f0;
      }

      /* ── Progress Panel ────────────────────────────────────────────────── */
      #progress-panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
        display: none;
        flex-direction: column;
        gap: 6px;
      }
      #progress-panel.visible {
        display: flex;
      }

      .progress-header {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid #334155;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #steps-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 180px;
        overflow-y: auto;
      }

      #steps-list li {
        font-size: 11px;
        color: #94a3b8;
        padding: 4px 6px;
        border-radius: 4px;
        background: #0f1117;
        border-left: 2px solid #334155;
        word-break: break-word;
      }
      #steps-list li.done {
        border-left-color: #22c55e;
        color: #86efac;
      }
      #steps-list li.error {
        border-left-color: #ef4444;
        color: #fca5a5;
      }
      #steps-list li.thinking {
        border-left-color: #6366f1;
        color: #a5b4fc;
        font-style: italic;
      }
      #steps-list li.tool {
        border-left-color: #f59e0b;
        color: #fcd34d;
      }

            /* ── Result Panel ──────────────────────────────────────────────────── */
      #result-panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
        display: none;
      }
      #result-panel.visible {
        display: block;
      }
      #result-panel.success {
        border-color: #22c55e;
      }
      #result-panel.error {
        border-color: #ef4444;
      }

      #result-text {
        font-size: 12px;
        line-height: 1.6;
        color: #cbd5e1;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* ── Footer ────────────────────────────────────────────────────────── */
      .footer {
        padding: 8px 16px;
        border-top: 1px solid #1e293b;
        font-size: 10px;
        color: #475569;
        text-align: center;
      }

      /* ── Scrollbar ─────────────────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-icon">🤖</div>
      <div class="header-text">
        <h1>AI Browser Sidekick</h1>
        <p>AlgoProfessor AI R&D Internship</p>
      </div>
      <div class="status-dot" id="status-dot" title="Backend status"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Instruction -->
      <div class="input-group">
        <label>Instruction</label>
        <textarea
          id="instruction"
          placeholder="e.g. Fill the job application form with my name John Doe and email john@example.com"
        ></textarea>
      </div>

      <!-- URL -->
      <div class="input-group">
        <label>Starting URL (optional)</label>
        <input
          type="url"
          id="url-input"
          placeholder="https://example.com/apply"
        />
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="run-btn">▶ Run Task</button>
        <button class="btn btn-secondary" id="stop-btn">■ Stop</button>
      </div>

      <!-- Progress -->
      <div id="progress-panel">
        <div class="progress-header">
          <div class="spinner" id="spinner"></div>
          <span>Agent working...</span>
        </div>
        <ul id="steps-list"></ul>
      </div>

      <!-- Result -->
      <div id="result-panel">
        <pre id="result-text"></pre>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">Days 73–75 · LangGraph + Playwright + FastAPI</div>

    <script src="popup.js"></script>
  </body>
</html>
